# ============================================================================
# OpenOCD Flash Konfigurasyonu - ABOV A34G43x
# Kullanim: cmake --build build/debug --target flash
#
# Debugger probe secenekleri:
#   - CMSIS-DAP (ABOV debug board, DAPLink, vb.)  -> simdi aktif
#   - J-Link                                       -> alttaki satiri ac
# ============================================================================

# Debugger probe - birini sec:
source [find interface/cmsis-dap.cfg]
# source [find interface/jlink.cfg]

# ABOV A34G43x hedef cip
source [find target/abov32v3.cfg]

# JTAG/SWD hizi (kHz) - dusuk hiz zamanlama sorunlarini onler
adapter speed 1000

# Reset konfigurasyonu
# SRST kullanilmiyor: donanim reseti sirasinda DAP erisimi kesiliyor (AP write error)
# SYSRESETREQ yalnizca CPU cekirdegini resetler, DAP erisimini korur
reset_config none
cortex_m reset_config sysresetreq
